name: Wikipedia Badminton Watchdog

on:
  schedule:
    # 設定排程，例如每小時的第 0 分執行 (此為 UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch: # 允許在 Actions 頁面手動點擊按鈕觸發，方便測試

permissions:
  contents: write # 必須開放寫入權限，才能讓 Action 把 last_run_time.txt push 回來

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run Python script
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python badminton-article-watchdog-no-pwd.py

      - name: Commit and push tracking records
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 將 history 與 logs 資料夾加入追蹤
          git add history.txt logs/
          
          # 檢查是否有變動，有的話才 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: archive monthly Wikipedia records [skip ci]" && git push)