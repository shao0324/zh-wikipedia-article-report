name: Wikipedia Badminton Watchdog

on:
  schedule:
    # 設定排程，每 3 小時執行一次 (此為 UTC 時間)
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允許在 Actions 頁面手動點擊按鈕觸發，方便測試

permissions:
  contents: write # 必須開放寫入權限，才能讓 Action 把 last_run_time.txt push 回來

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run Python script
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          KEYWORDS: ${{ vars.KEYWORDS }}
        run: python zh-wikipedia-ariticle-report.py

      - name: Commit and push tracking records
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 將當下目錄所有的變動（包含新增的檔案）加入追蹤
          git add -A
          
          # 使用 git status --porcelain 檢查是否有被追蹤的變動
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore: archive monthly Wikipedia records [skip ci]"
            git push
            echo "✅ 紀錄已成功 Commit 並推播！"
          else
            echo "⏭️ 沒有產生新的檔案或變動，略過 Commit。"
          fi
